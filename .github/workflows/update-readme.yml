name: Update README

on:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Recent Problems
        run: | 
         git fetch --all
         
         RECENT=$(git log \
           --pretty=format:"%s" \
           -n 50 \
           | grep "LeetSync" \
           | sed 's/ - LeetSync//g' \
           | head -n 5)

         {
          echo "### Latest Activity"
          echo ""

          while read line
          do
            [ -n "$line" ] && echo "- $line"
          done <<< "$RECENT"

         } > recent.txt

         awk '
         BEGIN {skip=0}
         /<!-- LEETCODE_RECENT_START -->/ {
          print
          while ((getline line < "recent.txt") > 0) print line
          skip=1
          next
         }
         /<!-- LEETCODE_RECENT_END -->/ {
           skip=0
           print
           next
         }
         !skip
         ' README.md > README_NEW.md

         mv README_NEW.md README.md
         
      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add README.md
          git commit -m "Update recent problems" || exit 0
          git push
